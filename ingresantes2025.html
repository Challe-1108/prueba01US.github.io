<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresantes 2025 - Universal Schools</title>

    <link rel="stylesheet" href="estilos/ingresantes.css">
</head>

<body>

    <header>
        <h1>Universal Schools</h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="matriculas.html">Matrículas</a>
        </nav>
    </header>

    <section class="cabecera">

        <h2>Ingresantes 2025</h2>

        <p>
            Nuestros estudiantes que alcanzaron su ingreso
            a la Universidad Nacional de Trujillo en los procesos
            2025-1 y 2025-2. ¡Felicitaciones a todos por su esfuerzo y dedicación!
        </p>

    </section>

    <section class="galeria">

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/cp251.jpg" alt="Ingresante 2025-1: CP251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/grc251.jpg" alt="Ingresante 2025-1: GRC251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/jhr251.jpg" alt="Ingresante 2025-1: JHR251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/mal251.jpg" alt="Ingresante 2025-1: MAL251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/ovs251.jpg" alt="Ingresante 2025-1: OVS251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/qle251.jpg" alt="Ingresante 2025-1: QLE251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/rc251.jpg" alt="Ingresante 2025-1: RC251">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-1/ssr251.jpg" alt="Ingresante 2025-1: SSR251">
        </div>



        <div class="card">
            <img src="imagenes/ingresantes_2025/25-2/cgpc252.jpg" alt="Ingresante 2025-2: CGPC252">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-2/cjaf252.jpg" alt="Ingresante 2025-2: CJAF252">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-2/cpk252.jpg" alt="Ingresante 2025-2: CPK252">
        </div>

        <div class="card">
            <img src="imagenes/ingresantes_2025/25-2/pqr252.jpg" alt="Ingresante 2025-2: PQR252">
        </div>

    </section>

    <div id="modal" class="modal">

        <span class="cerrar">&times;</span>

        <img id="imagenGrande" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="Imagen ampliada">

    </div>

    <footer>

        <p>
            © 2026 Universal Schools - Todos los derechos reservados
        </p>

    </footer>

    <script>

        const modal = document.getElementById("modal");

        const imagenGrande = document.getElementById("imagenGrande");

        const imagenes = document.querySelectorAll(".card img");

        imagenes.forEach(img => {

            img.addEventListener("click", () => {
                modal.style.display = "flex";
                imagenGrande.src = img.src;
            });
        });

        document.querySelector(".cerrar").addEventListener("click", () => {
                modal.style.display = "none";
            });

        modal.addEventListener("click", (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });

    </script>

</body>

</html>
